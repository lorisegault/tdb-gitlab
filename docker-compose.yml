services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - tdb_data:/app/data

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  tdb_data:
